<!DOCTYPE html>
<html>
<head>
  <title>{{ branch | upper }} Sem {{ sem }} Papers</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/resource.css') }}">
</head>

<body>
<header class="top-header">
  <h2>📄 {{ branch | upper }} – Semester {{ sem }}</h2>
<a href="javascript:history.back()" class="back-btn">⟵ Back</a>
</header>

<section class="resource-container">

  {% if files %}
    {% for paper in files %}
      <div class="resource-card">
        <h3>{{ paper.title }}</h3>

        <iframe
          src="{{ paper.drive_link }}"
          width="100%"
          height="600"
          style="border:none;">
        </iframe>

      </div>
    {% endfor %}
  {% else %}
    <p>No papers available.</p>
{% endif %}
</section>

</body>
</html>
