<!DOCTYPE html>
<html>
<head>
  <title>Upload Resource</title>
</head>
<body>

<h2>Admin Upload</h2>

<form method="post">

  <label>Category</label><br>
  <select name="category" required>
    <option value="materials">Materials</option>
    <option value="videos">Videos</option>
    <option value="papers">Papers</option>
    <option value="aptitude">Aptitude</option>
    <option value="coding">Coding</option>
    <option value="interview">Interview</option>
  </select><br><br>

  <label>Branch</label><br>
  <input name="branch" placeholder="bca / cse / bba" required><br><br>

  <label>Semester</label><br>
  <input type="number" name="sem" min="1" max="6" required><br><br>

  <label>Title</label><br>
  <input name="title" placeholder="DBMS Unit 1 Notes" required><br><br>

  <label>File / Video URL</label><br>
  <input name="file_url" placeholder="PDF or YouTube link" required><br><br>

  <button type="submit">Upload</button>

</form>

</body>
</html>
